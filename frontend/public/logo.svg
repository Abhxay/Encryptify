<svg width="512" height="512" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="g" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#7c3aed"/>
            <stop offset="100%" stop-color="#0ea5e9"/>
        </linearGradient>
        <clipPath id="c">
            <rect x="0" y="0" width="72" height="72" rx="20"/>
        </clipPath>
    </defs>

    <!-- Background -->
    <rect width="72" height="72" rx="20" fill="url(#g)"/>
    <rect width="72" height="72" rx="20" fill="rgba(255,255,255,0.05)"/>

    <!-- Three cipher-block bars -->
    <rect x="14" y="15" width="38" height="9" rx="3" fill="white" opacity="0.95"/>
    <rect x="14" y="31" width="28" height="9" rx="3" fill="white" opacity="0.95"/>
    <rect x="14" y="47" width="38" height="9" rx="3" fill="white" opacity="0.95"/>

    <!-- Diagonal key slash -->
    <line x1="46" y1="14" x2="57" y2="58" stroke="rgba(255,255,255,0.22)" stroke-width="3" stroke-linecap="round"/>

    <!-- Cipher lock dot -->
    <circle cx="50" cy="35.5" r="4.5" fill="url(#g)"/>
    <circle cx="50" cy="35.5" r="2.5" fill="rgba(255,255,255,0.92)"/>

    <!-- Corner architectural cut -->
    <polygon points="72,0 72,18 54,0" fill="rgba(0,0,0,0.14)" clip-path="url(#c)"/>
</svg>